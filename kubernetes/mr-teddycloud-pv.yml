apiVersion: v1
kind: PersistentVolume
metadata:
  namespace: mr-do-teddycloud
  name: mr-do-teddycloud-pv-data
  labels:
    usage: mr-do-teddycloud-pv-data
spec:
  capacity:
    storage: 32Gi
  storageClassName: ""
  accessModes:
  - ReadWriteMany
#  persistentVolumeReclaimPolicy: Recycle
  volumeMode: Filesystem
#  mountOptions:
#   - hard
#   - nfsvers=4.1
  nfs:
    server: mr0.local
    path: "/srv/nfs4/homes/mr/teddycloud"
    readOnly: false
