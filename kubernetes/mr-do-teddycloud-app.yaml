apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-teddycloud
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-teddycloud.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: mr-do-teddycloud
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true