apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-teddycloud
  name: mr-do-teddycloud-service
spec:
  selector:
    app: mr-do-teddycloud
  type: LoadBalancer
  loadBalancerIP: 192.168.0.7
  ports:
#    - port: 80
#      targetPort: 80
#      protocol: TCP
#      name: webinterface
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: https-webinterface
    - port: 443
      targetPort: 443
      protocol: TCP
      name: boxport # Port is needed for the connection for the box, must not be changed!
